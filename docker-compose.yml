version: '3.8'

services:
  python-nlp-service:
    build: ./python-nlp-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  textanalyzer-api:
    build: ./src
    ports:
      - "5000/8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Gemini_ApiKey=${GEMINI_API_KEY}
      - PythonNlp__BaseUrl=http://python-nlp-service:8000
    depends_on:
      - python-hlp-service:
          condition: service_healthy